; =============================================
; PHP Security Configuration – Lab Formation
; =============================================
; Ce fichier est monté via Docker volume dans
; /usr/local/etc/php/conf.d/security.ini

; --- Masquer PHP aux attaquants ---
expose_php = Off

; --- Ne jamais afficher les erreurs en production ---
display_errors = Off
display_startup_errors = Off

; --- Logger les erreurs côté serveur ---
log_errors = On
error_log = /var/log/php_errors.log

; --- Limiter la taille des uploads (protection DoS basique) ---
upload_max_filesize = 2M
post_max_size = 4M

; --- Désactiver des fonctions dangereuses ---
; Adapter selon les besoins du lab (exec/shell_exec sont utilisés volontairement en TP6)
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen

; --- Sessions ---
; NE PAS configurer ici pour le lab : les apprenants appliquent ces corrections
; manuellement dans config.php pendant le TP4 (sessions-authentification).
; En production, ces directives seraient ici :
;   session.cookie_httponly = 1
;   session.cookie_secure   = 1   (HTTPS uniquement)
;   session.use_strict_mode = 1
;   session.cookie_samesite = Strict

; --- Désactiver les magic quotes (déjà Off en PHP 8, pour mémoire) ---
; magic_quotes_gpc = Off
